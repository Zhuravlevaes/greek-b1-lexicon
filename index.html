<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#23395B"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><meta name="apple-mobile-web-app-capable" content="yes"><title>Greek B1 Lexicon</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f7fb;color:#172033}*{box-sizing:border-box}header{position:sticky;top:0;z-index:10;background:#f5f7fbef;border-bottom:1px solid #dfe5ef}.wrap,main{max-width:1100px;margin:auto;padding:14px}.top{display:flex;justify-content:space-between;gap:12px}.title{font-size:21px;font-weight:850}.sub{font-size:12px;color:#657089}.stats,nav{display:flex;gap:7px;flex-wrap:wrap}.pill,button,input,select{border:1px solid #dfe5ef;background:#fff;border-radius:12px;padding:9px 11px}button{font-weight:750}.primary{background:#23395b;color:#fff}.hero{background:linear-gradient(135deg,#23395b,#3e5f8e);color:white;padding:20px;border-radius:20px;margin-bottom:14px}.filters{display:grid;grid-template-columns:1fr 180px;gap:8px;margin:14px 0}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}.family,.story{background:white;border:1px solid #dfe5ef;border-radius:20px;overflow:hidden}.family-head{padding:16px;background:#eef3fa}.family-title{display:flex;justify-content:space-between}.family-title h2{margin:0}.root{font-family:Georgia,serif;color:#395782;font-size:19px}.progress{height:8px;background:#dce3ee;border-radius:999px;overflow:hidden;margin-top:10px}.progress span{display:block;height:100%;background:#395782}.family-meta{font-size:12px;color:#657089;margin-top:6px}.word{border-top:1px solid #dfe5ef}.ws{padding:12px;display:flex;justify-content:space-between}.noun{background:#dcebfa}.verb{background:#dff2e1}.adj{background:#fff1b8}.adv{background:#eaddf6}.greek{font-weight:850;font-size:18px}.tr{font-size:14px}.detail{display:none;padding:12px;line-height:1.45}.word.open .detail{display:block}.label{font-size:11px;text-transform:uppercase;color:#657089;font-weight:800;margin-top:9px}.modal{display:none;position:fixed;inset:0;background:#0f172a88;z-index:30;align-items:center;justify-content:center;padding:15px}.modal.show{display:flex}.dialog{background:white;width:min(760px,100%);max-height:92vh;overflow:auto;border-radius:20px;padding:18px}.map{position:relative;min-height:430px;background:#f8fafc;border:1px solid #dfe5ef;border-radius:18px}.node{position:absolute;transform:translate(-50%,-50%);padding:10px 12px;border-radius:999px;border:1px solid #dfe5ef;background:white;font-weight:750;text-align:center}.node.center{background:#23395b;color:white}.node.synonym{background:#dff2e1}.node.antonym{background:#ffe0e0}.node.related{background:#eaddf6}.map svg{position:absolute;width:100%;height:100%}.card{min-height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.front{font-size:34px;font-weight:850}.back{display:none}.card.reveal .back{display:block}.grade{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.story{padding:18px;margin-bottom:14px}.story-text{font-size:17px;line-height:1.75}.highlight{background:#fff1b8;border-radius:5px;padding:1px 3px}.translation{display:none;background:#f8fafc;padding:14px;border-radius:14px;margin-top:12px}.translation.show{display:block}textarea{width:100%;min-height:220px}@media(max-width:700px){.grid{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.grade{grid-template-columns:1fr 1fr}.map{min-height:520px}}</style></head><body><header><div class="wrap"><div class="top"><div><div class="title">Greek B1 Lexicon</div><div class="sub">язык как сеть взаимосвязей</div></div><div id="stats" class="stats"></div></div><nav><button class="primary" onclick="startReview()">Повторить</button><button onclick="openStories()">Истории · скоро</button><button onclick="openImport()">Импорт</button><button onclick="backup()">Backup</button><button onclick="showChangelog()">Changelog</button></nav></div></header><main><section class="hero"><h1>Сегодня</h1><p id="todayText"></p></section><div class="filters"><input id="search" placeholder="Поиск по семье, слову, переводу…"><select id="theme"></select></div><div id="app" class="grid"></div></main><div id="mapModal" class="modal"><div class="dialog"><h2 id="mapTitle"></h2><div id="semanticMap" class="map"></div><p class="sub">Зелёный — близкое, красный — противоположное, фиолетовый — связанное.</p><button onclick="closeModal('mapModal')">Закрыть</button></div></div><div id="reviewModal" class="modal"><div class="dialog"><div id="reviewCard" class="card"></div><div id="revealControls"><button class="primary" onclick="reveal()">Показать ответ</button></div><div id="gradeControls" class="grade" style="display:none"><button onclick="grade(0)">Снова</button><button onclick="grade(3)">Трудно</button><button onclick="grade(4)">Хорошо</button><button onclick="grade(5)">Легко</button></div><button onclick="closeModal('reviewModal')">Закрыть</button></div></div><div id="importModal" class="modal"><div class="dialog"><h2>Импорт</h2><input type="file" id="fileInput" accept=".json"><textarea id="importText"></textarea><button class="primary" onclick="applyImport()">Импортировать</button><button onclick="closeModal('importModal')">Отмена</button><p id="msg"></p></div></div><div id="changelogModal" class="modal"><div class="dialog"><h2>История версий</h2><pre id="changeText" style="white-space:pre-wrap"></pre><button onclick="closeModal('changelogModal')">Закрыть</button></div></div><script>const APP_VERSION='1.1.0',KEY='greekB1PWA.v2',OLD='greekB1PWA.v1';let db={families:[],entries:[],stories:[]},deck=[],current=0;const today=()=>new Date().toISOString().slice(0,10),addDays=n=>{let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)},esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function init(){let fresh=await fetch('data.json').then(r=>r.json()),saved=localStorage.getItem(KEY);db=saved?merge(fresh,JSON.parse(saved)):fresh;if(!saved)migrate();save();fill();render();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js')}function migrate(){try{let o=JSON.parse(localStorage.getItem(OLD)||'[]'),m=new Map(o.map(x=>[x.word,x]));db.entries=db.entries.map(x=>{let p=m.get(x.word);return p?{...x,ease:p.ease??2.5,interval:p.interval??0,repetitions:p.repetitions??0,due:p.due??null,status:p.status??'Новое'}:x})}catch(e){}}function merge(f,s){let m=new Map((s.entries||[]).map(x=>[x.id||x.word,x]));f.entries=f.entries.map(x=>{let p=m.get(x.id)||m.get(x.word);return p?{...x,ease:p.ease??2.5,interval:p.interval??0,repetitions:p.repetitions??0,due:p.due??null,status:p.status??'Новое'}:x});return f}function save(){localStorage.setItem(KEY,JSON.stringify(db))}function due(x){return !x.due||x.due<=today()}function pc(p){return p==='Существительное'?'noun':p==='Глагол'?'verb':p==='Прилагательное'?'adj':'adv'}function fill(){theme.innerHTML='<option value="">Все темы</option>'+[...new Set(db.families.map(x=>x.theme))].map(x=>`<option>${esc(x)}</option>`).join('')}function render(){let q=search.value.toLowerCase(),fs=db.families.filter(f=>(!q||JSON.stringify(f).toLowerCase().includes(q)||db.entries.filter(e=>e.family_id===f.id).some(e=>JSON.stringify(e).toLowerCase().includes(q)))&&(!theme.value||f.theme===theme.value));app.innerHTML=fs.map(f=>familyHTML(f)).join('');let d=db.entries.filter(due).length;stats.innerHTML=`<span class="pill">v${APP_VERSION}</span><span class="pill">${db.families.length} семей</span><span class="pill">${db.entries.length} слов</span><span class="pill">${d} сегодня</span>`;todayText.textContent=d?`На сегодня запланировано ${d} карточек.`:'На сегодня повторений нет.'}function familyHTML(f){let w=db.entries.filter(e=>e.family_id===f.id),k=w.filter(x=>x.repetitions>=3||x.status==='Знаю').length,p=Math.round(k/w.length*100);return `<section class="family"><div class="family-head"><div class="family-title"><div><h2>${esc(f.emoji)} ${esc(f.title_ru)}</h2><div class="root">${esc(f.root)}</div></div><button onclick="openMap('${f.id}')">Карта</button></div><div class="progress"><span style="width:${p}%"></span></div><div class="family-meta">${k} из ${w.length} освоено · ${esc(f.theme)}</div></div>${w.map(wordHTML).join('')}</section>`}function wordHTML(x){return `<div class="word" onclick="this.classList.toggle('open')"><div class="ws ${pc(x.part_of_speech)}"><div><div class="greek">${esc(x.word)}</div><div class="tr">${esc(x.translation)}</div></div><div>${esc(x.emoji_scene)}</div></div><div class="detail">${field('Формы',x.forms)}${field('Сочетания',x.collocations)}${field('Пример',x.example_el)}${field('Перевод',x.example_ru)}${field('Синонимы',x.synonyms)}${field('Антонимы',x.antonyms)}</div></div>`}function field(l,v){return v&&v!=='—'?`<div class="label">${l}</div><div>${esc(v)}</div>`:''}[search,theme].forEach(e=>e.addEventListener('input',render));function openMap(id){let f=db.families.find(x=>x.id===id),w=db.entries.filter(x=>x.family_id===id),n=[{text:f.root,type:'center'},...w.map(x=>({text:x.word,type:pc(x.part_of_speech)})),...f.connections.map(x=>({text:x.target,type:x.type}))];mapTitle.textContent=f.title_ru+' · '+f.root;let h='<svg>',r=38;for(let i=1;i<n.length;i++){let a=2*Math.PI*(i-1)/(n.length-1)-Math.PI/2,x=50+r*Math.cos(a),y=50+r*Math.sin(a);h+=`<line x1="50%" y1="50%" x2="${x}%" y2="${y}%" stroke="#aab6c8"/>`}h+='</svg><div class="node center" style="left:50%;top:50%">'+esc(n[0].text)+'</div>';for(let i=1;i<n.length;i++){let a=2*Math.PI*(i-1)/(n.length-1)-Math.PI/2,x=50+r*Math.cos(a),y=50+r*Math.sin(a);h+=`<div class="node ${n[i].type}" style="left:${x}%;top:${y}%">${esc(n[i].text)}</div>`}semanticMap.innerHTML=h;mapModal.classList.add('show')}function startReview(){deck=db.entries.filter(due).sort(()=>Math.random()-.5);if(!deck.length)return alert('На сегодня карточек нет.');current=0;reviewModal.classList.add('show');showCard()}function showCard(){let x=deck[current];reviewCard.className='card';reviewCard.innerHTML=`<div class="front">${esc(x.word)}</div><div class="back"><h2>${esc(x.translation)}</h2><p>${esc(x.example_el)}</p><p>${esc(x.example_ru)}</p></div>`;revealControls.style.display='block';gradeControls.style.display='none'}function reveal(){reviewCard.classList.add('reveal');revealControls.style.display='none';gradeControls.style.display='grid'}function grade(q){let x=deck[current];if(q<3){x.repetitions=0;x.interval=1}else{x.interval=x.repetitions===0?1:x.repetitions===1?6:Math.max(1,Math.round(x.interval*x.ease));x.repetitions++}x.due=addDays(x.interval);x.status=x.repetitions>=3?'Знаю':'Учу';save();if(++current>=deck.length){closeModal('reviewModal');render();alert('Готово')}else showCard()}function openImport(){importModal.classList.add('show')}function closeModal(id){document.getElementById(id).classList.remove('show')}fileInput.addEventListener('change',async e=>{if(e.target.files[0])importText.value=await e.target.files[0].text()});function applyImport(){try{let p=JSON.parse(importText.value);for(let k of ['families','entries','stories'])if(p[k]){let m=new Map((db[k]||[]).map(x=>[x.id,x]));p[k].forEach(x=>m.set(x.id,{...(m.get(x.id)||{}),...x}));db[k]=[...m.values()]}save();fill();render();msg.textContent='Импортировано.'}catch(e){msg.textContent=e.message}}function backup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='Greek_B1_backup.json';a.click()}function showChangelog(){fetch('CHANGELOG.md').then(r=>r.text()).then(t=>{changeText.textContent=t;changelogModal.classList.add('show')})}function openStories(){alert('Истории появятся в v1.2.');}init();</script></body></html>
