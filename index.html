<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#23395B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Greek B1 Lexicon</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#657089;--line:#dfe5ef;--navy:#23395b;--noun:#dcebfa;--verb:#dff2e1;--adj:#fff1b8;--adv:#eaddf6}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;background:rgba(245,247,251,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:5}
.wrap{max-width:1100px;margin:auto;padding:14px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.title{font-weight:800;font-size:21px}.sub{font-size:12px;color:var(--muted)}
.stats{display:flex;gap:7px;flex-wrap:wrap}.pill{background:#fff;border:1px solid var(--line);padding:6px 9px;border-radius:999px;font-size:12px}
nav{display:flex;gap:8px;margin-top:12px;overflow:auto}button,select,input{font:inherit;border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px 12px}
button{font-weight:700}.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
main{max-width:1100px;margin:auto;padding:14px}.hero{background:linear-gradient(135deg,#23395b,#3e5f8e);color:#fff;padding:20px;border-radius:20px;margin-bottom:14px}
.hero h1{margin:0 0 6px;font-size:25px}.hero p{margin:0;opacity:.9}.actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.filters{display:grid;grid-template-columns:1fr repeat(2,160px);gap:8px;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}.family{background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden}
.fh{padding:14px;background:#eef3fa}.fh h2{margin:0}.root{font-family:Georgia,serif;color:#395782}.word{border-top:1px solid var(--line)}
.ws{padding:12px;display:flex;gap:10px}.ws.noun{background:var(--noun)}.ws.verb{background:var(--verb)}.ws.adj{background:var(--adj)}.ws.adv{background:var(--adv)}
.greek{font-size:18px;font-weight:800}.tr{font-size:14px;margin-top:3px}.detail{display:none;padding:12px;line-height:1.45;font-size:14px}.word.open .detail{display:block}
.label{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:800;margin-top:8px}
.modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.52);z-index:20;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}
.dialog{background:#fff;width:min(700px,100%);max-height:90vh;overflow:auto;border-radius:20px;padding:18px}
.card{min-height:330px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.front{font-size:34px;font-weight:850}.back{display:none;margin-top:18px}.card.reveal .back{display:block}
.grade{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.grade button{padding:12px 6px}
textarea{width:100%;min-height:240px;border:1px solid var(--line);border-radius:12px;padding:10px}
@media(max-width:700px){.filters{grid-template-columns:1fr 1fr}.filters input{grid-column:1/-1}.grid{grid-template-columns:1fr}.top{align-items:flex-start}}
</style>
</head>
<body>
<header><div class="wrap"><div class="top"><div><div class="title">Greek B1 Lexicon</div><div class="sub">словообразовательные семьи + интервальное повторение</div></div><div class="stats" id="stats"></div></div>
<nav><button class="primary" onclick="startReview()">Повторить сегодня</button><button onclick="openImport()">Импорт</button><button onclick="backup()">Резервная копия</button></nav></div></header>
<main>
<section class="hero"><h1 id="todayTitle">Сегодня</h1><p id="todayText"></p><div class="actions"><button class="primary" onclick="startReview()">Начать повторение</button><button onclick="showNew()">Учить новые</button></div></section>
<div class="filters"><input id="search" placeholder="Поиск по слову, переводу, корню…"><select id="theme"></select><select id="pos"></select></div>
<div id="app" class="grid"></div>
</main>

<div id="reviewModal" class="modal"><div class="dialog">
<div id="reviewCard" class="card"></div>
<div id="revealControls"><button class="primary" style="width:100%" onclick="reveal()">Показать ответ</button></div>
<div id="gradeControls" style="display:none"><div class="grade">
<button onclick="grade(0)">Снова</button><button onclick="grade(3)">Трудно</button><button onclick="grade(4)">Хорошо</button><button onclick="grade(5)">Легко</button>
</div></div><div style="margin-top:10px"><button onclick="closeModal('reviewModal')">Закрыть</button></div>
</div></div>

<div id="importModal" class="modal"><div class="dialog"><h2>Импорт обновления</h2>
<p>Вставь JSON-файл обновления, который подготовит ChatGPT.</p><input type="file" id="fileInput" accept=".json"><textarea id="importText"></textarea>
<div class="actions"><button class="primary" onclick="applyImport()">Импортировать</button><button onclick="closeModal('importModal')">Отмена</button></div>
<p id="msg"></p></div></div>

<script>
const KEY='greekB1PWA.v1'; let data=[], deck=[], current=0;
const today=()=>new Date().toISOString().slice(0,10);
const addDays=(n)=>{let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
async function init(){let saved=localStorage.getItem(KEY);if(saved){data=JSON.parse(saved)}else{data=await fetch('data.json').then(r=>r.json());save()}initFilters();render();registerSW()}
function save(){localStorage.setItem(KEY,JSON.stringify(data))}
function registerSW(){if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js')}
function due(x){return !x.due||x.due<=today()}
function pc(p){return p==='Существительное'?'noun':p==='Глагол'?'verb':p==='Прилагательное'?'adj':p==='Наречие'?'adv':''}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function initFilters(){let themes=[...new Set(data.map(x=>x.theme))];theme.innerHTML='<option value="">Все темы</option>'+themes.map(x=>`<option>${esc(x)}</option>`).join('');let ps=[...new Set(data.map(x=>x.part_of_speech))];pos.innerHTML='<option value="">Все части речи</option>'+ps.map(x=>`<option>${esc(x)}</option>`).join('')}
function render(){let q=search.value.toLowerCase(), rows=data.filter(x=>(!q||Object.values(x).join(' ').toLowerCase().includes(q))&&(!theme.value||x.theme===theme.value)&&(!pos.value||x.part_of_speech===pos.value));let g={};rows.forEach(x=>(g[x.family_id]??=[]).push(x));app.innerHTML=Object.values(g).map(items=>{let f=items[0];return `<section class="family"><div class="fh"><h2>${esc(f.family_title_ru)}</h2><div class="root">${esc(f.root)}</div><div class="sub">${esc(f.theme)} · ${esc(f.subtheme)}</div></div>${items.map(wordHTML).join('')}</section>`}).join('');
let d=data.filter(due).length,n=data.filter(x=>x.repetitions===0).length,k=data.filter(x=>x.repetitions>0).length;stats.innerHTML=`<span class="pill">${data.length} слов</span><span class="pill">${d} сегодня</span><span class="pill">${k} изучаются</span>`;todayText.textContent=d?`На сегодня запланировано ${d} карточек. Новых слов: ${n}.`:'На сегодня повторений нет.'}
function wordHTML(x){return `<div class="word" onclick="this.classList.toggle('open')"><div class="ws ${pc(x.part_of_speech)}"><div><div class="greek">${esc(x.word)}</div><div class="tr">${esc(x.translation)}</div></div></div><div class="detail">${field('Формы',x.forms)}${field('Сочетания',x.collocations)}${field('Пример',x.example_el)}${field('Перевод',x.example_ru)}${field('Синонимы',x.synonyms)}${field('Антонимы',x.antonyms)}${field('Следующее повторение',x.due||'ещё не начато')}</div></div>`}
function field(l,v){return v&&v!=='—'?`<div class="label">${l}</div><div>${esc(v)}</div>`:''}
[search,theme,pos].forEach(e=>e.addEventListener('input',render))
function startReview(){deck=data.filter(due).sort(()=>Math.random()-.5);if(!deck.length)return alert('На сегодня карточек нет.');current=0;reviewModal.classList.add('show');showCard()}
function showNew(){deck=data.filter(x=>x.repetitions===0).sort(()=>Math.random()-.5);if(!deck.length)return alert('Новых слов нет.');current=0;reviewModal.classList.add('show');showCard()}
function showCard(){let x=deck[current];reviewCard.className='card';reviewCard.innerHTML=`<div class="front">${esc(x.word)}</div><div class="back"><h2>${esc(x.translation)}</h2><p>${esc(x.example_el||'')}</p><p class="sub">${esc(x.example_ru||'')}</p></div>`;revealControls.style.display='block';gradeControls.style.display='none'}
function reveal(){reviewCard.classList.add('reveal');revealControls.style.display='none';gradeControls.style.display='block'}
function grade(q){let x=deck[current];if(q<3){x.repetitions=0;x.interval=1}else{if(x.repetitions===0)x.interval=1;else if(x.repetitions===1)x.interval=6;else x.interval=Math.max(1,Math.round(x.interval*x.ease));x.repetitions++;x.ease=Math.max(1.3,x.ease+(0.1-(5-q)*(0.08+(5-q)*0.02)))}x.due=addDays(x.interval);x.status=x.repetitions>2?'Учу':'Новое';save();current++;if(current>=deck.length){closeModal('reviewModal');render();alert('Повторение завершено.')}else showCard()}
function openImport(){importModal.classList.add('show')}
function closeModal(id){document.getElementById(id).classList.remove('show')}
fileInput.addEventListener('change',async e=>{if(e.target.files[0])importText.value=await e.target.files[0].text()})
function applyImport(){try{let p=JSON.parse(importText.value);let map=new Map(data.map(x=>[x.family_id+'|||'+x.word,x]));p.entries.forEach(x=>{let k=x.family_id+'|||'+x.word;map.set(k,{ease:2.5,interval:0,repetitions:0,due:null,status:'Новое',...(map.get(k)||{}),...x})});data=[...map.values()];save();initFilters();render();msg.textContent=`Добавлено/обновлено: ${p.entries.length}`;}catch(e){msg.textContent='Ошибка: '+e.message}}
function backup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({schema_version:1,mode:'replace',entries:data},null,2)],{type:'application/json'}));a.download='Greek_B1_backup.json';a.click()}
init();
</script>
</body></html>
