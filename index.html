<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#23395B"><link rel="manifest" href="manifest.webmanifest"><meta name="apple-mobile-web-app-capable" content="yes"><title>Greek B1 Lexicon</title><style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#657089;--line:#dfe5ef;--navy:#23395b;--noun:#dcebfa;--verb:#dff2e1;--adj:#fff1b8;--adv:#eaddf6}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
header{position:sticky;top:0;z-index:10;background:rgba(245,247,251,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.wrap,main{max-width:1120px;margin:auto;padding:16px}
.brand{display:flex;flex-direction:column;gap:5px;min-width:230px}.title{font-size:22px;font-weight:850;line-height:1.15}.subtitle{font-size:13px;color:var(--muted);line-height:1.35;margin-bottom:4px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:18px}.stats,nav{display:flex;gap:8px;flex-wrap:wrap}
nav{margin-top:14px}.pill,button,input,select{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px}
button{font-weight:750;cursor:pointer}.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.hero{background:linear-gradient(135deg,#23395b,#496790);color:#fff;padding:22px;border-radius:20px;margin-bottom:16px}.hero h1{margin:0 0 14px;line-height:1.15}.hero p{margin:0;line-height:1.45}
.filters{display:grid;grid-template-columns:1fr 190px;gap:10px;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px}
.family{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 8px 24px rgba(35,57,91,.06)}.family-head{padding:17px;background:#eef3fa}
.family-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.family-title h2{margin:0 0 4px}.root{font-family:Georgia,serif;color:#395782;font-size:19px}
.progress{height:8px;background:#dce3ee;border-radius:999px;overflow:hidden;margin-top:12px}.progress span{display:block;height:100%;background:#395782}.family-meta{font-size:12px;color:var(--muted);margin-top:7px}
.word{border-top:1px solid var(--line)}.word-top{padding:13px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.noun{background:var(--noun)}.verb{background:var(--verb)}.adj{background:var(--adj)}.adv{background:var(--adv)}
.greek{font-weight:850;font-size:18px;line-height:1.25}.tr{font-size:14px;line-height:1.35;margin-top:4px}.mini{font-size:24px}
.detail{display:none;padding:13px;line-height:1.5}.word.open .detail{display:block}.label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:800;margin-top:10px}
.illustration{margin:12px 0 4px;border-radius:16px;overflow:hidden;border:1px solid var(--line)}.illustration svg{display:block;width:100%;height:auto}
.modal{display:none;position:fixed;inset:0;background:#0f172a88;z-index:30;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}.dialog{background:#fff;width:min(780px,100%);max-height:92vh;overflow:auto;border-radius:20px;padding:19px}
.map{position:relative;min-height:470px;background:#f8fafc;border:1px solid var(--line);border-radius:18px}.map svg{position:absolute;width:100%;height:100%}.node{position:absolute;transform:translate(-50%,-50%);max-width:150px;padding:10px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-weight:750;text-align:center;font-size:13px}.node.center{background:#23395b;color:#fff}.node.synonym{background:#dff2e1}.node.antonym{background:#ffe0e0}.node.related{background:#eaddf6}
textarea{width:100%;min-height:230px;border:1px solid var(--line);border-radius:12px;padding:10px}.card{min-height:320px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.front{font-size:34px;font-weight:850}.back{display:none}.card.reveal .back{display:block}.grade{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.story{background:#fff;border:1px solid var(--line);border-radius:18px;padding:17px;margin-bottom:14px}.story h3{margin:0 0 5px}.story-text{font-size:17px;line-height:1.75}.translation{display:none;background:#f8fafc;border-radius:14px;padding:14px;margin-top:12px;line-height:1.6}.translation.show{display:block}.highlight{background:#fff1b8;border-radius:5px;padding:1px 3px}.story-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}@media(max-width:700px){.top{flex-direction:column}.stats{margin-top:2px}.grid{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.grade{grid-template-columns:1fr 1fr}.map{min-height:600px}.wrap,main{padding:13px}}
</style></head><body>
<header><div class="wrap"><div class="top"><div class="brand"><div class="title">Greek B1 Lexicon</div><div class="subtitle">Язык как сеть взаимосвязей: семьи, контекст и повторение</div></div><div id="stats" class="stats"></div></div><nav><button class="primary" onclick="startReview()">Повторить</button><button onclick="openStories()">Истории</button><button onclick="openImport()">Импорт</button><button onclick="backup()">Backup</button><button onclick="showChangelog()">Changelog</button></nav></div></header>
<main><section class="hero"><h1>Сегодня</h1><p id="todayText"></p></section><div class="filters"><input id="search" placeholder="Поиск по семье, слову или переводу…"><select id="theme"></select></div><div id="app" class="grid"></div></main>
<div id="mapModal" class="modal"><div class="dialog"><h2 id="mapTitle"></h2><div id="semanticMap" class="map"></div><p class="subtitle">Зелёный — близкое слово, красный — противоположное, фиолетовый — тематически связанное.</p><button onclick="closeModal('mapModal')">Закрыть</button></div></div>
<div id="reviewModal" class="modal"><div class="dialog"><div id="reviewCard" class="card"></div><div id="revealControls"><button class="primary" onclick="reveal()">Показать ответ</button></div><div id="gradeControls" class="grade" style="display:none"><button onclick="grade(0)">Снова</button><button onclick="grade(3)">Трудно</button><button onclick="grade(4)">Хорошо</button><button onclick="grade(5)">Легко</button></div><button onclick="closeModal('reviewModal')">Закрыть</button></div></div>
<div id="importModal" class="modal"><div class="dialog"><h2>Импорт обновления</h2><input type="file" id="fileInput" accept=".json"><textarea id="importText" placeholder="Выбери JSON-файл или вставь его содержимое"></textarea><p><button class="primary" onclick="applyImport()">Импортировать</button> <button onclick="closeModal('importModal')">Отмена</button></p><p id="msg"></p></div></div>
<div id="storiesModal" class="modal"><div class="dialog"><h2>Истории</h2><div id="storiesList"></div><button onclick="closeModal('storiesModal')">Закрыть</button></div></div><div id="changelogModal" class="modal"><div class="dialog"><h2>История версий</h2><pre id="changeText" style="white-space:pre-wrap"></pre><button onclick="closeModal('changelogModal')">Закрыть</button></div></div>
<script>
const VERSION='1.3.0',KEY='greekB1PWA.v2',OLD='greekB1PWA.v1';
let db={families:[],entries:[],stories:[]},deck=[],current=0;
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const addDays=n=>{let d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function save(){localStorage.setItem(KEY,JSON.stringify(db))}
function due(x){return !x.due||x.due<=today()}
function pc(p){return p==='Существительное'?'noun':p==='Глагол'?'verb':p==='Прилагательное'?'adj':'adv'}
async function init(){
 const fresh=await fetch('data.json').then(r=>r.json());
 const saved=localStorage.getItem(KEY);
 db=saved?mergeFresh(fresh,JSON.parse(saved)):fresh;
 if(!saved)migrateOld();
 save();fillFilters();render();
 if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js');
}
function mergeFresh(fresh,saved){
 const fam=new Map((fresh.families||[]).map(x=>[x.id,x]));
 (saved.families||[]).forEach(x=>fam.set(x.id,{...(fam.get(x.id)||{}),...x}));
 const ent=new Map((fresh.entries||[]).map(x=>[x.id||x.word,x]));
 (saved.entries||[]).forEach(x=>ent.set(x.id||x.word,{...(ent.get(x.id||x.word)||{}),...x}));
 return {families:[...fam.values()],entries:[...ent.values()],stories:saved.stories||fresh.stories||[]};
}
function migrateOld(){
 try{
   const old=JSON.parse(localStorage.getItem(OLD)||'[]');
   if(!Array.isArray(old))return;
   const m=new Map(old.map(x=>[x.word,x]));
   db.entries=db.entries.map(x=>m.has(x.word)?{...x,...m.get(x.word),id:x.id,family_id:x.family_id}:x);
 }catch(e){}
}
function fillFilters(){
 const current=$('theme').value;
 $('theme').innerHTML='<option value="">Все темы</option>'+[...new Set(db.families.map(x=>x.theme).filter(Boolean))].sort().map(x=>`<option>${esc(x)}</option>`).join('');
 $('theme').value=current;
}
function render(){
 const q=$('search').value.trim().toLowerCase(),theme=$('theme').value;
 const families=db.families.filter(f=>{
   const words=db.entries.filter(e=>e.family_id===f.id);
   return (!theme||f.theme===theme)&&(!q||JSON.stringify(f).toLowerCase().includes(q)||words.some(e=>JSON.stringify(e).toLowerCase().includes(q)));
 });
 $('app').innerHTML=families.map(f=>familyHTML(f)).join('')||'<p>Ничего не найдено.</p>';
 const dueCount=db.entries.filter(due).length;
 $('stats').innerHTML=`<span class="pill">v${VERSION}</span><span class="pill">${db.families.length} семей</span><span class="pill">${db.entries.length} слов</span><span class="pill">${dueCount} сегодня</span>`;
 $('todayText').textContent=dueCount?`На сегодня запланировано ${dueCount} карточек.`:'На сегодня повторений нет.';
}
function familyHTML(f){
 const words=db.entries.filter(e=>e.family_id===f.id);
 const known=words.filter(x=>x.repetitions>=3||x.status==='Знаю').length;
 const pct=words.length?Math.round(known/words.length*100):0;
 return `<section class="family"><div class="family-head"><div class="family-title"><div><h2>${esc(f.emoji||'🌳')} ${esc(f.title_ru)}</h2><div class="root">${esc(f.root)}</div></div><button onclick="openMap('${f.id}')">Карта</button></div><div class="progress"><span style="width:${pct}%"></span></div><div class="family-meta">${known} из ${words.length} освоено · ${esc(f.theme||'')}</div></div>${words.map(wordHTML).join('')}</section>`;
}
function wordHTML(x){
 const ill=x.illustration_svg?`<div class="illustration">${x.illustration_svg}</div>`:'';
 return `<article class="word" onclick="this.classList.toggle('open')"><div class="word-top ${pc(x.part_of_speech)}"><div><div class="greek">${esc(x.word)}</div><div class="tr">${esc(x.translation)}</div></div><div class="mini">${esc(x.emoji_scene||'')}</div></div><div class="detail">${ill}${field('Формы',x.forms)}${field('Сочетания',x.collocations)}${field('Пример',x.example_el)}${field('Перевод',x.example_ru)}${field('Синонимы / близкие',x.synonyms)}${field('Антонимы',x.antonyms)}${field('Заметка',x.usage_note)}</div></article>`;
}
function field(l,v){return v&&v!=='—'?`<div class="label">${l}</div><div>${esc(v)}</div>`:''}
function openMap(id){
 const f=db.families.find(x=>x.id===id),words=db.entries.filter(x=>x.family_id===id);
 const nodes=[{text:f.root,type:'center'},...words.map(x=>({text:x.word,type:pc(x.part_of_speech)})),...(f.connections||[]).map(x=>({text:x.target,type:x.type}))];
 $('mapTitle').textContent=`${f.title_ru} · ${f.root}`;
 let h='<svg>',r=39;
 nodes.slice(1).forEach((n,i)=>{let a=2*Math.PI*i/(nodes.length-1)-Math.PI/2,x=50+r*Math.cos(a),y=50+r*Math.sin(a);h+=`<line x1="50%" y1="50%" x2="${x}%" y2="${y}%" stroke="#aab6c8" stroke-width="1.3"/>`});
 h+='</svg><div class="node center" style="left:50%;top:50%">'+esc(nodes[0].text)+'</div>';
 nodes.slice(1).forEach((n,i)=>{let a=2*Math.PI*i/(nodes.length-1)-Math.PI/2,x=50+r*Math.cos(a),y=50+r*Math.sin(a);h+=`<div class="node ${n.type}" style="left:${x}%;top:${y}%">${esc(n.text)}</div>`});
 $('semanticMap').innerHTML=h;$('mapModal').classList.add('show');
}
function startReview(){deck=db.entries.filter(due).sort(()=>Math.random()-.5);if(!deck.length)return alert('На сегодня карточек нет.');current=0;$('reviewModal').classList.add('show');showCard()}
function showCard(){let x=deck[current];$('reviewCard').className='card';$('reviewCard').innerHTML=`<div class="front">${esc(x.word)}</div><div class="back"><h2>${esc(x.translation)}</h2><p>${esc(x.example_el||'')}</p><p>${esc(x.example_ru||'')}</p></div>`;$('revealControls').style.display='block';$('gradeControls').style.display='none'}
function reveal(){$('reviewCard').classList.add('reveal');$('revealControls').style.display='none';$('gradeControls').style.display='grid'}
function grade(q){let x=deck[current];if(q<3){x.repetitions=0;x.interval=1}else{x.interval=x.repetitions===0?1:x.repetitions===1?6:Math.max(1,Math.round(x.interval*(x.ease||2.5)));x.repetitions++;}x.due=addDays(x.interval);x.status=x.repetitions>=3?'Знаю':'Учу';save();if(++current>=deck.length){closeModal('reviewModal');render();alert('Повторение завершено.')}else showCard()}
function openImport(){$('importModal').classList.add('show')}
function closeModal(id){$(id).classList.remove('show')}
$('fileInput').addEventListener('change',async e=>{if(e.target.files[0])$('importText').value=await e.target.files[0].text()});
function applyImport(){
 try{
  const p=JSON.parse($('importText').value);
  ['families','entries','stories'].forEach(k=>{
   if(!p[k])return;
   const m=new Map((db[k]||[]).map(x=>[x.id||x.word,x]));
   p[k].forEach(x=>{const key=x.id||x.word,old=m.get(key)||{};m.set(key,{...old,...x})});
   db[k]=[...m.values()];
  });
  save();fillFilters();render();$('msg').textContent='Обновление импортировано.';
 }catch(e){$('msg').textContent='Ошибка: '+e.message}
}
function backup(){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(db,null,2)],{type:'application/json'}));a.download='Greek_B1_backup.json';a.click()}
function showChangelog(){fetch('CHANGELOG.md').then(r=>r.text()).then(t=>{$('changeText').textContent=t;$('changelogModal').classList.add('show')})}

function openStories(){
 const list=db.stories||[];
 if(!list.length){$('storiesList').innerHTML='<p>Историй пока нет. Они сохранятся после обновления, если уже были в базе, и могут добавляться через JSON-импорт.</p>'}
 else{
  $('storiesList').innerHTML=list.map(s=>{
   let tx=esc(s.text_el||''),used=(s.used_word_ids||[]).map(id=>db.entries.find(x=>x.id===id)).filter(Boolean);
   used.forEach(w=>{let base=(w.word||'').split(' / ')[0];if(base)tx=tx.replaceAll(base,`<span class="highlight">${base}</span>`)});
   return `<article class="story"><h3>${esc(s.title_ru||'История')}</h3><div class="subtitle">${esc(s.level||'B1')} · ${esc(s.theme||'')}</div><div class="story-text">${tx}</div><div class="story-actions"><button onclick="this.parentElement.nextElementSibling.classList.toggle('show')">Перевод</button><button onclick="this.parentElement.nextElementSibling.nextElementSibling.classList.toggle('show')">Слова (${used.length})</button></div><div class="translation">${esc(s.text_ru||'')}</div><div class="translation">${used.map(x=>`${esc(x.word)} — ${esc(x.translation)}`).join('<br>')}</div></article>`;
  }).join('');
 }
 $('storiesModal').classList.add('show');
}
$('search').addEventListener('input',render);$('theme').addEventListener('input',render);init();
</script></body></html>
